<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>게임 이용 안내 · Game Guide</title>

<!-- 본문용: 프리텐다드 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<!-- 폰트가 아직 안 붙었을 때의 임시 대체(로딩 실패 시에만 보임) -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap">

<style>
/* ══════════════════════════════════════════════════════════════
   ★ 폰트 붙이는 곳 ★
   ① 제목 : 양구조 굵은고딕체  (--display)
   ② 숫자 : DECOMO            (--numeral)
   ③ 본문 : 프리텐다드 레귤러  (--body, 위 CDN에서 이미 로드됨)

   [방법 A] 눈누 웹폰트 (추천)
     눈누 폰트 상세페이지 → "웹폰트로 사용" 코드 복사 →
     아래 @font-face의 src 줄만 그 주소로 바꾸기.
     font-family 이름은 'YangguJo' / 'DECOMO' 그대로 두면 됩니다.

   [방법 B] 파일 직접 넣기
     받은 ttf/otf를 이 HTML 옆 fonts/ 폴더에 넣고 아래 경로만 맞추기.
     (ttf도 브라우저에서 바로 동작합니다. 용량이 크면 woff2 변환 권장)
   ══════════════════════════════════════════════════════════════ */
@font-face{
  font-family:'HsSummerWater20';                /* HS여름물빛체 2.0 */
  src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2405@1.0/HSYeoleum20-Regular.woff2') format('woff2');
  font-weight:normal;
  font-display:swap;
}
@font-face{
  font-family:'DECOMO';                         /* 숫자 1 · 2 · 3 전용 */
  src:url('./fonts/DECOMO.woff2') format('woff2'),
      url('./fonts/DECOMO.ttf')  format('truetype');
  font-weight:400;
  font-display:swap;
  /* 숫자만 이 폰트를 쓰도록 제한 */
  unicode-range:U+0030-0039;
}

:root{
  --ink:#000;
  --line:#000;
  --paper:#fff;
  --red:#ff2d2d;
  --green:#22e06a;
  --blue:#2f6bff;
  --hl-yellow:#fff23d;
  --hl-pink:#ff8ee6;
  --hl-blue:#8fd4ff;
  --hl-violet:#b7b0ff;
  --hl-mint:#9ff5e0;
  --display:'HsSummerWater20','Black Han Sans','Pretendard',sans-serif;
  --numeral:'DECOMO','HsSummerWater20','Black Han Sans',sans-serif;
  --body:'HsSummerWater20','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
  --pretendard:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:22px 18px 140px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.sheet{width:100%;max-width:560px;position:relative}

/* ── 상단 바 : 언어 전환 + 스텝 표시 ───────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:26px;
}
.steps-dots{display:flex;gap:7px;align-items:center}
.dot{
  width:26px;height:4px;background:#e2e2e2;border-radius:2px;
  transition:background .25s ease,width .25s ease;
}
.dot.on{width:34px;background:#000}
.dot.done{background:#9a9a9a}

.lang{display:flex;border:1.5px solid var(--line);border-radius:999px;overflow:hidden}
.lang button{
  font-family:var(--body);font-weight:600;font-size:12px;letter-spacing:.04em;
  padding:7px 13px;background:transparent;border:0;cursor:pointer;color:#000;
}
.lang button+button{border-left:1.5px solid var(--line)}
.lang button.on{background:#000;color:#fff}

/* ── 페이지 헤더(번호 + 타이틀 + 글로우) ───────── */
/* 레이어 순서(아래→위): 숫자(z:1) → 글로우(z:2) → 제목텍스트(z:3) */
.head{position:relative;height:260px;margin-bottom:6px}
.head-img{
  display:block;width:50%;height:auto;
  margin:0 auto 12px;
}

/* z:2 */
.glow{
  position:absolute;
  left:48%;top:55%;
  transform:translate(-50%,-50%);
  width:240px;height:120px;border-radius:50%;
  filter:blur(28px);opacity:.85;
  z-index:2;
}
.glow.red  {background:#FF0000}
.glow.green{background:#00FF37}
.glow.blue {background:#0055FF}

/* z:1 — 글로우 아래, 상단 살짝 우측 */
.numeral{
  position:absolute;
  left:50%;top:52%;
  transform:translate(-50%,-50%) scaleY(1.35);
  font-family:var(--numeral);font-size:190px;line-height:1;
  color:#000;
  z-index:1;
  letter-spacing:-.02em;
  width:max-content;
}
.numeral[data-num="1"]{left:45.5%}

/* z:3 — 글로우 위, 세로 중앙보다 살짝 아래 */
.page-title{
  position:absolute;
  left:50%;top:58%;
  transform:translate(-50%,-50%);
  z-index:3;
  font-family:var(--display);font-size:62px;line-height:1;
  color:#fff;letter-spacing:.01em;white-space:nowrap;
  text-shadow:
    -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
    0 -1px 0 #000, 0 1px 0 #000, -1px 0 0 #000, 1px 0 0 #000;
}
.rule{height:2px;background:#000;margin:12px 0 40px}

/* ── 모드 선택 카드 ────────────────────────────── */
.mode{
  display:flex;flex-direction:column;align-items:center;
  padding:22px 10px 26px;cursor:pointer;background:none;border:0;width:100%;
  border-radius:14px;transition:transform .18s ease,background .18s ease;
  font-family:var(--pretendard);font-weight:400;color:#000;
}
.mode+.mode{margin-top:26px}
.mode:hover{background:#f6f6f6;transform:translateY(-2px)}
.mode:active{transform:scale(.985)}
.mode-title{font-family:var(--display);font-size:32px;line-height:1.15;margin-bottom:12px}
.chip{
  background:#000;color:#fff;font-family:var(--pretendard);font-size:13px;font-weight:400;line-height:1.45;
  padding:5px 14px;text-align:center;
}
.stem{width:1.5px;height:26px;background:#000;margin:0 auto}
.box{
  border:1.5px solid #000;padding:12px 20px;text-align:center;
  font-family:var(--pretendard);font-weight:400;
  font-size:14px;line-height:1.55;background:#fff;
}
.hint{
  font-family:var(--pretendard);font-weight:400;
  text-align:center;font-size:12px;color:#8a8a8a;margin-top:34px;letter-spacing:.02em;
}

/* ── 팀명 입력 페이지 ──────────────────────────── */
.team-header{
  font-family:var(--display);font-size:52px;line-height:1.1;
  color:#fff;
  -webkit-text-stroke:2px #000;
  paint-order:stroke fill;
  letter-spacing:.02em;
}
.team-section{
  text-align:center;margin:36px 0;
}
.ts-label{
  font-family:var(--display);font-size:36px;line-height:1.2;
  color:#000;margin-bottom:8px;
}
.ts-chip{
  display:inline-block;
  font-family:var(--pretendard);font-weight:400;font-size:12px;
  background:#000;color:#fff;padding:4px 14px;border-radius:2px;
  margin-bottom:0;
}
.team-input{
  display:block;width:100%;box-sizing:border-box;
  font-family:var(--pretendard);font-weight:400;font-size:16px;
  border:1.5px solid #000;border-radius:4px;
  padding:14px 16px;outline:none;
  text-align:center;background:#fff;color:#000;
}
.team-input::placeholder{color:#bbb}
.team-input:focus{border-color:#555}
.team-err{
  font-family:var(--pretendard);font-size:12px;color:#d00;
  min-height:18px;margin-top:6px;
}
.team-err.shake{animation:shake .35s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
/* counter table */
.cnt-table{
  border:1.5px solid #000;border-radius:0;overflow:hidden;
  font-family:var(--pretendard);font-weight:400;
  margin-top:4px;
}
.cnt-header{
  display:grid;grid-template-columns:1fr 1fr;
  background:#000;color:#fff;
  font-family:var(--display);font-size:22px;
  text-align:center;
}
.cnt-col-head{padding:10px 0}
.cnt-note-row{
  display:grid;grid-template-columns:1fr 1fr;
  font-size:10px;color:#888;text-align:center;padding:4px 0 0;
}
.cnt-body{
  display:grid;grid-template-columns:1fr auto 1fr;
}
.cnt-col{padding:8px 4px}
.cnt-divider{
  width:0;border-left:1.5px dashed #ccc;margin:6px 0;
}
.cnt-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:6px 0;
}
.cnt-label{
  font-family:var(--pretendard);font-weight:600;font-size:13px;
  min-width:28px;text-align:right;
}
.cnt-val{
  font-family:var(--pretendard);font-weight:600;font-size:16px;
  min-width:20px;text-align:center;
}
.cnt-btn{
  width:30px;height:30px;border-radius:50%;
  border:none;background:#000;color:#fff;
  font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.cnt-btn:active{background:#444}
.team-start-btn{
  display:block;width:100%;
  font-family:var(--pretendard);font-weight:600;font-size:16px;
  background:#000;color:#fff;border:none;border-radius:6px;
  padding:16px;margin-top:32px;cursor:pointer;
}
.team-start-btn:active{background:#333}

/* ── 난이도 ────────────────────────────────────── */
.mode-badge{
  display:block;width:max-content;margin:-24px auto 30px;
  border:1.5px solid #000;border-radius:999px;padding:6px 18px;
  font-family:var(--pretendard);font-size:14px;font-weight:600;letter-spacing:.02em;
}

.diff-wrap{display:grid;grid-template-columns:30px 1fr;gap:10px;align-items:stretch}
.rail{position:relative;display:flex;align-items:center;justify-content:center}
.rail::before{
  content:"";position:absolute;top:6px;bottom:16px;left:50%;width:1.5px;background:#000;
}
.rail::after{ /* 화살촉 */
  content:"";position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;border-top:9px solid #000;
}
.rail span{
  position:relative;background:#fff;padding:6px 0;
  font-family:var(--pretendard);font-size:11px;font-weight:600;line-height:1.35;letter-spacing:.06em;
  writing-mode:vertical-rl;text-orientation:upright;
}
.groups{display:flex;flex-direction:column;gap:16px}
.group{display:grid;grid-template-columns:1fr 14px 1fr;gap:0;align-items:center}
.opts{display:flex;flex-direction:column;gap:6px;position:relative}
.bar{
  position:relative;background:#000;color:#fff;border:0;cursor:pointer;
  font-family:var(--pretendard);font-weight:400;font-size:16px;
  padding:15px 8px;text-align:center;width:100%;
  transition:transform .15s ease,box-shadow .15s ease;
}
.bar:hover{transform:translateX(3px)}
.bar.sel{
  box-shadow:0 0 0 2.5px #fff,0 0 0 5px var(--red);
}
.bar.sel::after{
  content:"✓";position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--red);font-weight:700;
}
.new{
  position:absolute;left:-16px;top:50%;transform:translateY(-50%) rotate(-11deg);
  background:var(--hl-yellow);color:#000;font-family:var(--pretendard);font-weight:400;font-size:11px;
  padding:8px 7px;z-index:3;pointer-events:none;
  clip-path:polygon(50% 0,61% 14%,76% 6%,79% 23%,95% 22%,90% 38%,100% 50%,90% 62%,95% 78%,79% 77%,76% 94%,61% 86%,50% 100%,39% 86%,24% 94%,21% 77%,5% 78%,10% 62%,0 50%,10% 38%,5% 22%,21% 23%,24% 6%,39% 14%);
}
.brace{
  width:14px;
  align-self:center;
}
.brace-none{width:14px}
.callout{
  position:relative;z-index:0;
  border:1.5px solid #000;padding:10px 12px 12px;text-align:center;background:#fff;
  display:flex;flex-direction:column;justify-content:center;gap:6px;
}
.callout.compact{padding:14px 12px}
.c-title{
  position:relative;
  font-family:var(--display);font-size:24px;line-height:1.35;
  display:inline-block;padding:2px 6px;
  color:#fff;
  -webkit-text-stroke:1.4px #000;
  paint-order:stroke fill;
  letter-spacing:.01em;
}
/* 글자 뒤 컬러 글로우 */
.c-title::before{
  content:attr(data-t);
  position:absolute;left:6px;top:2px;
  z-index:-1;
  color:transparent;
  -webkit-text-stroke:0;
  filter:blur(9px);
  opacity:.95;
  background-clip:text;-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.c-title.pink::before{background-image:linear-gradient(#FF6EE4,#FF6EE4)}
.c-title.yellow::before{background-image:linear-gradient(#2FFF00,#2FFF00)}
.c-title.blue::before{background-image:linear-gradient(#0D3DFF,#0D3DFF)}
.c-title.violet::before{background-image:linear-gradient(#BF00FF,#BF00FF)}
.c-title.mint::before{background-image:linear-gradient(90deg,#63e6be,#339af0)}
.c-body{font-family:var(--pretendard);font-weight:400;font-size:13px;line-height:1.55;color:#000}



/* ── 타임랩스 ──────────────────────────────────── */
.tl{margin-top:20px;display:flex;flex-direction:column;gap:44px;text-align:center}
.tl-head{
  font-family:var(--display);font-size:19px;line-height:1.5;display:inline;
  background:var(--hl-yellow);padding:2px 8px;
  box-decoration-break:clone;-webkit-box-decoration-break:clone;
}
.tl-body{font-family:var(--display);font-size:17px;line-height:1.7;margin-top:12px}

/* ── 하단 내비게이션 ───────────────────────────── */
.nav{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;gap:10px;justify-content:center;
  padding:14px 18px calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,#fff 62%,rgba(255,255,255,0));
}
.nav-inner{display:flex;gap:10px;width:100%;max-width:560px}
.btn{
  flex:1;font-family:var(--body);font-weight:600;font-size:15px;
  padding:15px 10px;border:1.5px solid #000;background:#fff;color:#000;cursor:pointer;
  border-radius:2px;transition:opacity .15s ease;
}
.btn.primary{background:#000;color:#fff}
.btn:disabled{opacity:.28;cursor:not-allowed}
.btn.ghost{flex:0 0 96px}

.fade{animation:fade .32s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:400px){
  .head{height:200px}
  .numeral{font-size:140px}
  .page-title{font-size:40px;bottom:14px}
  .bar{font-size:14px;padding:13px 6px}
  .c-title{font-size:16px}.c-body{font-size:11px}
}
</style>
</head>
<body>
<main class="sheet">
  <div class="topbar">
    <div class="steps-dots" id="dots"></div>
    <div class="lang" id="lang"></div>
  </div>
  <div id="view"></div>
</main>

<nav class="nav"><div class="nav-inner" id="nav"></div></nav>

    modeHint: "Tap a mode to select",
    harder: "HARDER",
    section: { coop: "＜Co-op＞", rival: "＜Rival Match＞" },
    difficulty: {
      coop: [
        { options: [{ name: "Lumi's Hill Stroll" }, { name: "Walking Path", isNew: true }],
          hl: "pink",   title: "Great for young kids",
          body: ["Perfect for kids!", "Choose either Hill Stroll or Walking Path."] },
        { options: [{ name: "Nex's Jogging Course" }, { name: "Field Day", isNew: true }],
          hl: "yellow", title: "First time?!",
          body: ["Fun for everyone!", "Pick Jogging or Field Day."] },
        { options: [{ name: "Genie's Running Course" }],
          hl: "blue",   title: "Speed & agility!", body: [] },
        { options: [{ name: "Pumpy's Extreme Run" }],
          hl: "violet", title: "Brutally hard", body: [] }
      ],
      rival: [
        { options: [{ name: "Warm-Up" }], hl: "yellow", title: "Light & fun!", body: [] },
        { options: [{ name: "All-In" }],  hl: "blue",   title: "Go all out!!",  body: [] }
      ]
    },
    footNote: "★ Select a difficulty and circle it on the paper ★",
    timelapse: [
      { head: ["Time-lapse recorded automatically!"],
        body: ["Pick it up at the counter after the game!"] },
      { head: ["Each room has a phone stand"],
        body: ["Bring your phone if you'd like", "to record your own video."] }
    ],
    ui: { back: "Back", next: "Next", start: "Submit", pickDiff: "Pick one difficulty" }
  }
};

/* ── 상태 ─────────────────────────────────────── */
const state = { lang: "ko", step: 0, mode: null, diff: null, teamName: "", count: { af: 0, am: 0, yf: 0, ym: 0 } };
const T = () => CONTENT[state.lang];
const view = document.getElementById("view");
const nav  = document.getElementById("nav");
const esc  = s => s.replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

/* ── 렌더 ─────────────────────────────────────── */
function header(i){
  const s = T().steps[i];
  if(s.img){
    return `<img class="head-img" src="${s.img}" alt="${s.title}"><div class="rule"></div>`;
  }
  if(!s.num){
    return `<div class="head">
        <div class="glow ${s.color}"></div>
        <div class="page-title team-header" data-t="${esc(s.title)}">${esc(s.title)}</div>
      </div><div class="rule"></div>`;
  }
  return `<div class="head">
      <div class="glow ${s.color}"></div>
      <div class="numeral" data-num="${s.num}">${s.num}</div>
      <div class="page-title">${esc(s.title)}</div>
    </div><div class="rule"></div>`;
}

function pageTeam(){
  const tp = T().teamPage;
  const c = state.count;
  const row = (label, key) => `
    <div class="cnt-row">
      <span class="cnt-label">${esc(label)}</span>
      <button class="cnt-btn" data-cnt="${key}" data-dir="-">◀</button>
      <span class="cnt-val" id="cnt-${key}">${c[key]}</span>
      <button class="cnt-btn" data-cnt="${key}" data-dir="+">▶</button>
    </div>`;
  return header(0) + `
    <div class="team-section">
      <div class="ts-label">${esc(tp.nameLabel)}</div>
      <div class="ts-chip">${esc(tp.nameWarn)}</div>
      <div class="stem"></div>
      <input id="teamInput" class="team-input" type="text" maxlength="20"
             placeholder="${esc(tp.namePlaceholder)}" value="${esc(state.teamName)}">
      <p class="team-err" id="teamErr"></p>
    </div>
    <div class="team-section">
      <div class="ts-label">${esc(tp.countLabel)}</div>
      <div class="ts-chip">${esc(tp.countWarn)}</div>
      <div class="stem"></div>
      <div class="cnt-table">
        <div class="cnt-header">
          <div class="cnt-col-head">${esc(tp.adult)}</div>
          <div class="cnt-col-head">${esc(tp.youth)}</div>
        </div>
        <div class="cnt-note-row"><div class="cnt-note">${esc(tp.youthNote)}</div><div class="cnt-note"></div></div>
        <div class="cnt-body">
          <div class="cnt-col">
            ${row(tp.female, "af")}
            ${row(tp.male, "am")}
          </div>
          <div class="cnt-divider"></div>
          <div class="cnt-col">
            ${row(tp.female, "yf")}
            ${row(tp.male, "ym")}
          </div>
        </div>
      </div>
    </div>
    <button class="team-start-btn" data-team-start>${esc(tp.startBtn)}</button>`;
}

function pageMode(){
  const cards = T().modes.map(m => `
    <button class="mode" data-mode="${m.id}">
      <div class="mode-title">${esc(m.title)}</div>
      <div class="chip">${m.chip.map(esc).join("<br>")}</div>
      <div class="stem"></div>
      <div class="box">${m.desc.map(esc).join("<br>")}</div>
    </button>`).join("");
  return header(1) + cards + `<p class="hint">${esc(T().modeHint)}</p>`;
}

function pageDiff(){
  const t = T();
  const mode = t.modes.find(m => m.id === state.mode);
  const groups = t.difficulty[state.mode].map((g, gi) => {
    const opts = g.options.map((o, oi) => {
      const key = gi + "-" + oi;
      const sel = state.diff === key ? " sel" : "";
      const badge = o.isNew ? `<span class="new">NEW!!</span>` : "";
      return `<div style="position:relative">${badge}<button class="bar${sel}" data-diff="${key}">${esc(o.name)}</button></div>`;
    }).join("");
    const body = g.body.length ? `<p class="c-body">${g.body.map(esc).join("<br>")}</p>` : "";
    const braceEl = g.options.length > 1 ? '<div class="brace"></div>' : '<div class="brace-none"></div>';
    return `<div class="group">
        <div class="opts">${opts}</div>
        ${braceEl}
        <div class="callout${g.body.length ? "" : " compact"}">
          <div><span class="c-title ${g.hl}" data-t="${esc(g.title)}">${esc(g.title)}</span></div>
          ${body}
        </div>
      </div>`;
  }).join("");

  return header(2) + `
    <span class="mode-badge">${esc(mode.title)}</span>
    <div class="diff-wrap">
      <div class="rail"><span>${esc(t.harder)}</span></div>
      <div class="groups">${groups}</div>
    </div>`;
}

function pageTime(){
  const blocks = T().timelapse.map(b => `
    <section>
      <div><span class="tl-head">${b.head.map(esc).join("<br>")}</span></div>
      <p class="tl-body">${b.body.map(esc).join("<br>")}</p>
    </section>`).join("");
  return header(3) + `<div class="tl">${blocks}</div>`;
}

function renderNav(){
  const u = T().ui;
  if (state.step === 0){ nav.innerHTML = ""; return; }
  if (state.step === 1){
    nav.innerHTML =
      `<button class="btn ghost" data-go="0">${esc(u.back)}</button>`;
    return;
  }
  if (state.step === 2){
    nav.innerHTML =
      `<button class="btn ghost" data-go="1">${esc(u.back)}</button>
       <button class="btn primary" data-go="3" ${state.diff ? "" : "disabled"}>
         ${esc(state.diff ? u.next : u.pickDiff)}
       </button>`;
  } else {
    nav.innerHTML =
      `<button class="btn ghost" data-go="2">${esc(u.back)}</button>
       <button class="btn primary" data-go="0">${esc(u.start)}</button>`;
  }
}

function renderDots(){
  document.getElementById("dots").innerHTML = [0,1,2,3].map(i =>
    `<div class="dot ${i === state.step ? "on" : i < state.step ? "done" : ""}"></div>`).join("");
}

function renderLang(){
  document.getElementById("lang").innerHTML = Object.keys(CONTENT).map(k =>
    `<button data-lang="${k}" class="${k === state.lang ? "on" : ""}">${CONTENT[k].label}</button>`).join("");
}

function render(){
  view.innerHTML = [pageTeam, pageMode, pageDiff, pageTime][state.step]();
  view.firstElementChild?.classList.add("fade");
  view.classList.add("fade");
  setTimeout(() => view.classList.remove("fade"), 350);
  renderDots(); renderLang(); renderNav();
  document.documentElement.lang = state.lang;
}

/* ── 이벤트 ───────────────────────────────────── */
document.addEventListener("click", e => {
  const mode = e.target.closest("[data-mode]");
  if (mode){ state.mode = mode.dataset.mode; state.diff = null; state.step = 2; render(); return; }

  const diff = e.target.closest("[data-diff]");
  if (diff){ state.diff = diff.dataset.diff; state.step = 3; window.scrollTo({ top: 0, behavior: "smooth" }); render(); return; }

  const go = e.target.closest("[data-go]");
  if (go){
    state.step = +go.dataset.go;
    if (state.step === 0){ state.mode = null; state.diff = null; state.teamName = ''; state.count = { af:0, am:0, yf:0, ym:0 }; }
    window.scrollTo({ top: 0, behavior: "smooth" });
    render(); return;
  }

  /* counter +/- */
  const cnt = e.target.closest("[data-cnt]");
  if (cnt){
    const k = cnt.dataset.cnt;
    const d = cnt.dataset.dir === "+" ? 1 : -1;
    state.count[k] = Math.max(0, Math.min(99, state.count[k] + d));
    const el = document.getElementById("cnt-" + k);
    if (el) el.textContent = state.count[k];
    return;
  }

  /* team start button */
  const start = e.target.closest("[data-team-start]");
  if (start){
    const inp = document.getElementById("teamInput");
    const name = (inp ? inp.value : "").trim();
    if (!name){ shakeErr("teamErr", T().teamPage.nameWarn); return; }
    if (hasBadWord(name)){ shakeErr("teamErr", "⚠ " + T().teamPage.nameWarn); inp.value = ""; state.teamName = ""; return; }
    const total = state.count.af + state.count.am + state.count.yf + state.count.ym;
    if (total < 1){ shakeErr("teamErr", T().teamPage.countWarn); return; }
    state.teamName = name;
    state.step = 1;
    window.scrollTo({ top: 0, behavior: "smooth" });
    render();
    return;
  }

  const lang = e.target.closest("[data-lang]");
  if (lang){ state.lang = lang.dataset.lang; render(); }
});

/* team name live save */
document.addEventListener("input", e => {
  if (e.target.id === "teamInput") state.teamName = e.target.value;
});

/* profanity filter (Korean + English basics) */
const BAD_WORDS = [
  "씨발","시발","ㅅㅂ","ㅆㅂ","개새끼","ㄱㅅㄲ","병신","ㅂㅅ","지랄","ㅈㄹ",
  "년","놈","미친","fuck","shit","damn","bitch","ass","dick","cunt",
  "bastard","retard","nigger","nigga","whore","slut","faggot"
];
function hasBadWord(str){
  const lower = str.toLowerCase().replace(/[\s_\-]/g,"");
  return BAD_WORDS.some(w => lower.includes(w));
}
function shakeErr(id, msg){
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");
}

render();
</script>
</body>
</html>
